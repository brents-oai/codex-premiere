<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Premiere Bridge</title>
    <link rel="stylesheet" href="css/panel.css" />
  </head>
  <body>
    <div class="app">
      <main class="panel-body">
        <section class="section section-static">
          <div class="section-title">
            <span class="module-title">Bridge Control</span>
          </div>
          <div class="module-body">
            <div class="section-head-inline">
              <div class="buttons">
                <button id="startBtn">Start bridge</button>
                <button id="stopBtn">Stop bridge</button>
              </div>
            </div>
          </div>
        </section>

        <section class="section module is-open" data-module>
          <button class="module-toggle" type="button" aria-expanded="true">
            <span class="module-chevron" aria-hidden="true"></span>
            <span class="module-title">Connection</span>
          </button>
          <div class="module-body">
            <div class="settings-grid">
              <div class="field">
                <label for="port">Port</label>
                <input id="port" type="number" min="1" max="65535" />
              </div>
              <div class="field field-token">
                <label for="token">Token</label>
                <div class="token-row">
                  <input id="token" type="text" />
                  <button id="regenBtn">Regenerate</button>
                </div>
              </div>
            </div>
            <div class="hint" id="configPath"></div>
          </div>
        </section>

        <section class="section module is-open" data-module>
          <button class="module-toggle" type="button" aria-expanded="true">
            <span class="module-chevron" aria-hidden="true"></span>
            <span class="module-title">Quick Checks</span>
          </button>
          <div class="module-body">
            <div class="quick-actions">
              <button id="pingBtn">Ping bridge</button>
              <button id="reloadBtn">Reload project</button>
            </div>
          </div>
        </section>

        <section class="section module is-open section-log" data-module>
          <button class="module-toggle" type="button" aria-expanded="true">
            <span class="module-chevron" aria-hidden="true"></span>
            <span class="module-title">Activity</span>
          </button>
          <div class="module-body">
            <pre id="log"></pre>
          </div>
        </section>
      </main>
    </div>

    <script src="js/panel.js"></script>
  </body>
</html>
